name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  bun-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: oven-sh/setup-bun@v2
      - run: bun i
      - run: bun run test:bun

  vitest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: oven-sh/setup-bun@v2
      - run: bun i
      - run: bun run test:vitest
